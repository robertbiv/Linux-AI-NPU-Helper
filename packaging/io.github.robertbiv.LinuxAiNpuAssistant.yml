app-id: io.github.robertbiv.LinuxAiNpuAssistant
runtime: org.gnome.Platform
runtime-version: '50'
sdk: org.gnome.Sdk
command: start-assistant

finish-args:
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --device=all
  - --share=network
  - --talk-name=org.freedesktop.Notifications
  - --talk-name=org.freedesktop.Flatpak

build-options:
  env:
    PYTHONPATH: /app/lib/python3.12/site-packages:/app/src

modules:
  - name: python-dependencies
    buildsystem: simple
    build-options:
      build-args:
        - --share=network
    build-commands:
      - pip3 install --prefix=/app -r requirements.txt --break-system-packages
      - pip3 install --prefix=/app PyQt5>=5.15.0 --break-system-packages
    sources:
      - type: file
        path: ../requirements.txt

  - name: linux-ai-npu-assistant
    buildsystem: simple
    build-commands:
      - mkdir -p /app/src
      - cp -r src /app/
      - |
        cat << 'WRAPPER' > /app/bin/start-assistant
        #!/bin/sh
        export PYTHONPATH=/app:$PYTHONPATH
        # Keep all app data/config/cache inside Flatpak sandbox storage.
        export XDG_DATA_HOME="${XDG_DATA_HOME:-/var/data}"
        export XDG_CONFIG_HOME="${XDG_CONFIG_HOME:-/var/config}"
        export XDG_CACHE_HOME="${XDG_CACHE_HOME:-/var/cache}"
        exec python3 -m src.main "$@"
        WRAPPER
      - chmod +x /app/bin/start-assistant
    sources:
      - type: dir
        path: ../src
        dest: src
