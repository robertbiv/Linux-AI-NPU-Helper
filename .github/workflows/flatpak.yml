name: Build Flatpak

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  flatpak:
    name: Build Flatpak
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build Flatpak
        uses: flatpak/flatpak-github-actions/flatpak-builder@v6
        with:
          bundle: LinuxAiNpuAssistant.flatpak
          manifest-path: packaging/io.github.robertbiv.LinuxAiNpuAssistant.yml
          cache-key: flatpak-builder-${{ github.sha }}

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: flatpak-bundle
          path: LinuxAiNpuAssistant.flatpak

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: LinuxAiNpuAssistant.flatpak
          generate_release_notes: true
